<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>My Shopping List & Map 🛒</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* Global & Layout */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fcf2f2; margin: 0; padding: 20px; }
    .section-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 80px; }
    .hidden { display: none !important; }

    /* Titres et Boutons */
    h2 { color: #333; display: flex; align-items: center; justify-content: space-between; }
    .title-icon-btn { cursor: pointer; color: #e91e63; transition: transform 0.2s; }
    .title-icon-btn:hover { transform: scale(1.2); }

    /* Map Section */
    #map { height: 400px; width: 100%; border-radius: 15px; margin: 15px 0; z-index: 1; }
    
    .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
    .search-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    .search-box button { background: #e91e63; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }

    /* Popup Form Styles */
    .popup-form { min-width: 180px; }
    .popup-form b { font-size: 1.1em; display: block; margin-bottom: 8px; color: #e91e63; }
    .popup-form select, .popup-form textarea { width: 100%; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; padding: 5px; font-family: inherit; }
    .popup-form button { width: 100%; background: #e91e63; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    
    /* Etoiles */
    .star-rating { margin-bottom: 10px; color: #f1c40f; font-size: 1.2em; cursor: pointer; display: flex; justify-content: center; gap: 5px; }

    /* Liste des lieux */
    .location-item { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #ccc; }
    .theme-food { border-left-color: #e67e22; }
    .theme-bar { border-left-color: #9b59b6; }
    .theme-shop { border-left-color: #2ecc71; }
    .theme-other { border-left-color: #95a5a6; }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; z-index: 1000; }
    .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.8em; color: #888; cursor: pointer; }
    .nav-item.active { color: #e91e63; }
  </style>
</head>

<body>

  <div id="buyLater" class="section-container section">
    <h2>Buy Later 🛒 <i class="fas fa-map-marker-alt title-icon-btn" id="openMapBtn" title="Voir la carte"></i></h2>
    <p>Clique sur l'icône Map pour voir tes lieux préférés !</p>
  </div>

  <div id="mapSection" class="section-container section hidden">
    <h2>Mes adresses de cœur 📍</h2>
    
    <div class="search-box">
      <input type="text" id="citySearchInput" placeholder="Chercher une ville (ex: Paris, Lyon...)">
      <button id="searchCityBtn"><i class="fas fa-search"></i></button>
    </div>

    <div id="map"></div>
    
    <h3>Lieux enregistrés</h3>
    <div id="savedLocationsList"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" id="navLater"><i class="fas fa-clock"></i><span>Later</span></div>
    <div class="nav-item" id="navMapMenu"><i class="fas fa-map-marked-alt"></i><span>Carte</span></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  
  <script>
    let map;
    let mapInitialized = false;
    let userMarker;
    let currentMarkers = []; // Pour pouvoir vider la map proprement

    const themeColors = {
      food: '#e67e22',
      bar: '#9b59b6',
      shop: '#2ecc71',
      other: '#95a5a6'
    };

    function initMap() {
      if (mapInitialized) return;
      
      // Centre par défaut (France)
      map = L.map('map').setView([46.603354, 1.888334], 6);
      
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);

      // 1. Géolocalisation automatique
      map.locate({setView: true, maxZoom: 14});

      map.on('locationfound', function(e) {
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.circleMarker(e.latlng, {
          radius: 8, fillColor: "#3498db", color: "#fff", weight: 2, fillOpacity: 0.8
        }).addTo(map).bindPopup("Tu es ici").openPopup();
      });

      // 2. Gestion de la recherche de ville (Zoom de cœur)
      document.getElementById('searchCityBtn').onclick = function() {
        const city = document.getElementById('citySearchInput').value;
        if(city) {
          fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}`)
            .then(res => res.json())
            .then(data => {
              if(data.length > 0) {
                map.setView([data[0].lat, data[0].lon], 13);
              } else {
                alert("Ville non trouvée");
              }
            });
        }
      };

      // 3. Clic sur la carte -> Popup unique
      map.on('click', function(e) {
        const { lat, lng } = e.latlng;
        
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
          .then(res => res.json())
          .then(data => {
            const name = data.display_name.split(',')[0] || "Lieu personnalisé";
            openFormPopup(lat, lng, name);
          });
      });

      renderLocationList();
      mapInitialized = true;
    }

    // Crée le formulaire HTML dans la bulle Leaflet
    function openFormPopup(lat, lng, name) {
      const popupContent = `
        <div class="popup-form">
          <b>${name}</b>
          <select id="p_theme">
            <option value="food">🍴 Food</option>
            <option value="bar">🍺 Bar / Café</option>
            <option value="shop">🛍️ Shopping</option>
            <option value="other">📍 Autre</option>
          </select>
          <div class="star-rating" id="p_stars">
            <i class="far fa-star" data-v="1"></i>
            <i class="far fa-star" data-v="2"></i>
            <i class="far fa-star" data-v="3"></i>
            <i class="far fa-star" data-v="4"></i>
            <i class="far fa-star" data-v="5"></i>
          </div>
          <input type="hidden" id="p_rating" value="0">
          <textarea id="p_note" rows="2" placeholder="Pourquoi kiffes-tu ce lieu ?"></textarea>
          <button onclick="saveAndClose(${lat}, ${lng}, '${name.replace(/'/g, "\\'")}')">Enregistrer</button>
        </div>
      `;

      L.popup().setLatLng([lat, lng]).setContent(popupContent).openOn(map);

      // Gestion dynamique des étoiles après l'injection HTML
      setTimeout(() => {
        const stars = document.querySelectorAll('#p_stars i');
        stars.forEach(s => {
          s.onclick = (e) => {
            const val = e.target.getAttribute('data-v');
            document.getElementById('p_rating').value = val;
            stars.forEach((st, i) => {
              st.className = i < val ? 'fas fa-star' : 'far fa-star';
            });
          };
        });
      }, 10);
    }

    function saveAndClose(lat, lng, name) {
      const theme = document.getElementById('p_theme').value;
      const rating = document.getElementById('p_rating').value;
      const note = document.getElementById('p_note').value;

      if (rating === "0") { alert("Donne au moins une étoile !"); return; }

      const locations = JSON.parse(localStorage.getItem('kiffLocations') || '[]');
      locations.push({ lat, lng, name, theme, rating, note });
      localStorage.setItem('kiffLocations', JSON.stringify(locations));
      
      map.closePopup();
      renderLocationList(); // Re-génère tout (liste + marqueurs)
    }

    function addMarkerToMap(loc) {
      const color = themeColors[loc.theme] || '#333';
      const starIcon = '★'.repeat(loc.rating);

      const customIcon = L.divIcon({
        className: 'custom-marker',
        html: `<div style="background-color:${color}; width:15px; height:15px; border:2px solid #white; border-radius:50%; box-shadow:0 0 8px rgba(0,0,0,0.4);"></div>`,
        iconSize: [15, 15],
        iconAnchor: [7, 7]
      });

      const marker = L.marker([loc.lat, loc.lng], {icon: customIcon}).addTo(map)
        .bindPopup(`<b>${loc.name}</b><br><span style="color:#f1c40f">${starIcon}</span><br>${loc.note}`);
      
      currentMarkers.push(marker);
    }

    function renderLocationList() {
      const list = document.getElementById('savedLocationsList');
      const locations = JSON.parse(localStorage.getItem('kiffLocations') || '[]');
      
      list.innerHTML = '';
      // On vide les anciens marqueurs de la map
      currentMarkers.forEach(m => map.removeLayer(m));
      currentMarkers = [];

      locations.forEach(loc => {
        // Ajout à la liste texte
        const item = document.createElement('div');
        item.className = `location-item theme-${loc.theme}`;
        item.innerHTML = `
          <div style="display:flex; justify-content:space-between;">
            <b>${loc.name}</b>
            <span style="color:#f1c40f">${'★'.repeat(loc.rating)}</span>
          </div>
          <div style="font-size:0.9em; color:#666; margin-top:5px;">${loc.note}</div>
        `;
        list.prepend(item);
        
        // Ajout du marqueur sur la map
        if (mapInitialized) addMarkerToMap(loc);
      });
    }

    // --- NAVIGATION ---
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
      
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if(id === 'mapSection') {
        document.getElementById('navMapMenu').classList.add('active');
        initMap();
        setTimeout(() => map.invalidateSize(), 300);
      } else {
        document.getElementById('navLater').classList.add('active');
      }
    }

    document.getElementById('openMapBtn').onclick = () => showSection('mapSection');
    document.getElementById('navMapMenu').onclick = () => showSection('mapSection');
    document.getElementById('navLater').onclick = () => showSection('buyLater');
  </script>
</body>
</html>
